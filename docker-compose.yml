services:
  faceanonymizer-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faceanonymizer-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    volumes:
      - ./FaceAnonymizer.Api/storage:/app/storage
    restart: unless-stopped

